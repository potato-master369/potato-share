<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Preview of {{ .Name }}</title>
	<style>
		body {
			font-family: sans-serif;
		}

		h1 {
			font-family: sans-serif;
			color: #313B46;
		}

		a {
			text-decoration: none;
			color: #313B46;
			font-family: sans-serif;
			display: block;
			/* Makes the entire grid cell hoverable */
			padding: 2px 4px;
		}

		summary:hover {
			color: #8ea7c1;
		}

		summary::-webkit-details-marker {
			display: none;
		}

		summary {
			list-style: none;
		}

		th,
		td {
			text-align: left;
			padding: 8px;
			border: 1px solid #313B46;
			margin: 0;
			font-family: sans-serif;
		}

		table {
			padding: 0;
			border-collapse: collapse;
		}
	</style>
</head>

<body>
	<h1>Preview of {{ .Name }}</h1>
	File information:

	<table>
		<tr>
			<th>File Name</th>
			<td>{{ .Name }}</td>
		</tr>
		<tr>
			<th>File Size</th>
			<td>{{ .Size }}</td>
		</tr>
		<tr>
			<th>Last Modified</th>
			<td>{{ .ModTime }}</td>
		</tr>
	</table>

	<br>
	Video Preview:
	<br>
	<script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video.js"></script>

	<video-player>
		<video-skin>
			<video src="{{ .URL }}" playsinline></video>
		</video-skin>
	</video-player>
	<br>
</body>

</html>
