<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - System Properties</title>

    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background-color: #008080; /* Classic Win98 Teal Desktop */
            font-family: "Pixelated MS Sans Serif", "MS Sans Serif", Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .admin-window {
            width: 520px;
            max-width: 100%;
        }

        .window-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 3D Inset Container for the Table */
        .table-view {
            background: #ffffff;
            border: 2px inset #dfdfdf;
            box-shadow: inset -1px -1px #fff, inset 1px 1px #0a0a0a, inset -2px -2px #dfdfdf, inset 2px 2px #808080;
            max-height: 220px;
            overflow-y: auto;
        }

        table.win98-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        table.win98-table th {
            background-color: #c0c0c0;
            font-weight: bold;
            text-align: left;
            padding: 3px 6px;
            border-top: 1px solid #fff;
            border-left: 1px solid #fff;
            border-right: 1px solid #000;
            border-bottom: 1px solid #000;
            box-shadow: inset -1px -1px #808080, inset 1px 1px #dfdfdf;
            position: sticky;
            top: 0;
            user-select: none;
        }

        table.win98-table td {
            padding: 4px 6px;
            border: none;
        }

        table.win98-table tr:hover td {
            background-color: #000080;
            color: #ffffff;
        }

        table.win98-table tr:hover td a {
            color: #ffffff;
        }

        .delete-btn {
            padding: 0 6px;
            min-width: auto;
            height: 18px;
            font-size: 10px;
            text-decoration: none;
            display: inline-block;
            line-height: 16px;
        }

        .status-bar {
            margin-top: 4px;
            display: flex;
            gap: 2px;
        }

        .status-field {
            background: #c0c0c0;
            border-top: 1px solid #808080;
            border-left: 1px solid #808080;
            border-right: 1px solid #fff;
            border-bottom: 1px solid #fff;
            padding: 2px 5px;
            font-size: 11px;
        }
    </style>
</head>

<body>

    <div class="window admin-window">
        <div class="title-bar">
            <div class="title-bar-text">
                <i class="fa-solid fa-user-shield"></i> Admin Panel - User Accounts
            </div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>

        <div class="window-body">
            <menu role="tablist">
                <li role="tab" aria-selected="true"><a href="#passwords">Password Management</a></li>
            </menu>

            <div class="window" role="tabpanel" style="padding: 12px; background: #c0c0c0;">
                
                <fieldset>
                    <legend>Create New Access Key</legend>
                    <form action="/passwd-create" method="POST" style="display: flex; flex-wrap: wrap; gap: 8px; align-items: center;">
                        <input type="text" name="passwd" placeholder="New password" required style="flex-grow: 1; height: 21px;">
                        
                        <select name="perms" style="height: 23px;">
                            <option value="admin">Admin</option>
                            <option value="user">User</option>
                            <option value="ro">Read-only</option>
                        </select>

                        <button type="submit">Create</button>
                    </form>
                </fieldset>

                <div style="margin: 10px 0 4px 0; font-size: 11px; font-weight: bold;">
                    Existing Passwords & Permissions:
                </div>

                <div class="table-view">
                    <table class="win98-table">
                        <thead>
                            <tr>
                                <th>Password</th>
                                <th>Permissions</th>
                                <th style="width: 60px; text-align: center;">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            {{range .Passwords}}
                            <tr>
                                <td>{{.Password}}</td>
                                <td>{{.Perms}}</td>
                                <td style="text-align: center;">
                                    <a href="/passwd-delete/{{.Password}}" class="delete-btn"><button style="padding: 0 4px; min-width: auto; height: 18px; font-size: 10px;">Delete</button></a>
                                </td>
                            </tr>
                            {{end}}
                        </tbody>
                    </table>
                </div>

            </div>

            <div class="status-bar">
                <div class="status-field" style="flex-grow: 1;">Security Level: High</div>
                <div class="status-field"><a href="/list" style="color: #000; text-decoration: none;">Exit Admin Panel</a></div>
            </div>
        </div>
    </div>

</body>

</html>
