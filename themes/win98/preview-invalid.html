<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview of {{ .Name }}</title>

    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background-color: #008080; /* Classic Win98 Teal Desktop */
            font-family: "Pixelated MS Sans Serif", "MS Sans Serif", Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .preview-window {
            width: 500px;
            max-width: 100%;
        }

        .window-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 3D Inset Container for Metadata */
        .table-view {
            background: #ffffff;
            border: 2px inset #dfdfdf;
            box-shadow: inset -1px -1px #fff, inset 1px 1px #0a0a0a, inset -2px -2px #dfdfdf, inset 2px 2px #808080;
        }

        table.win98-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        table.win98-table th {
            background-color: #c0c0c0;
            font-weight: bold;
            text-align: left;
            padding: 4px 8px;
            border-right: 1px solid #808080;
            border-bottom: 1px solid #808080;
            width: 30%;
            user-select: none;
        }

        table.win98-table td {
            padding: 4px 8px;
            border-bottom: 1px solid #dfdfdf;
            word-break: break-all;
        }

        /* Warning Box Style */
        .notice-box {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #c0c0c0;
            padding: 10px;
        }

        .notice-icon {
            font-size: 32px;
            color: #808000; /* Classic Warning Yellow/Gold tint */
        }

        .notice-text {
            font-size: 11px;
            line-height: 1.4;
        }

        .status-bar {
            margin-top: 4px;
            display: flex;
            gap: 2px;
        }

        .status-field {
            background: #c0c0c0;
            border-top: 1px solid #808080;
            border-left: 1px solid #808080;
            border-right: 1px solid #fff;
            border-bottom: 1px solid #fff;
            padding: 2px 5px;
            font-size: 11px;
        }

        .action-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 4px;
        }
    </style>
</head>

<body>

    <div class="window preview-window">
        <div class="title-bar">
            <div class="title-bar-text">
                <i class="fa-solid fa-file-triangle"></i> File Properties - {{ .Name }}
            </div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>

        <div class="window-body">

            <fieldset>
                <legend>File Information</legend>
                <div class="table-view">
                    <table class="win98-table">
                        <tr>
                            <th>File Name</th>
                            <td>{{ .Name }}</td>
                        </tr>
                        <tr>
                            <th>File Size</th>
                            <td>{{ .Size }}</td>
                        </tr>
                        <tr>
                            <th>Last Modified</th>
                            <td>{{ .ModTime }}</td>
                        </tr>
                    </table>
                </div>
            </fieldset>

            <div class="notice-box">
                <div class="notice-icon">
                    <i class="fa-solid fa-circle-exclamation"></i>
                </div>
                <div class="notice-text">
                    This file is not valid for preview. Please download it to view its contents.
                </div>
            </div>

            <div class="action-buttons">
                <a href="{{ .URL }}" download><button default><i class="fa-solid fa-download"></i> Download</button></a>
                <button onclick="javascript:history.back()">Cancel</button>
            </div>

            <div class="status-bar">
                <div class="status-field" style="flex-grow: 1;">No Preview Handler Installed</div>
                <div class="status-field"><a href="javascript:history.back()" style="color: #000; text-decoration: none;">Back</a></div>
            </div>

        </div>
    </div>

</body>

</html>
